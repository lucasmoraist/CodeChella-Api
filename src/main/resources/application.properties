#Porta onde vai ser executado o tomcat
server.port = 8050

#Informações para conexão no mysql
spring.datasource.url=jdbc:mysql://localhost/<name-database>?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=<user>
spring.datasource.password=<password>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Manipulando estruturas
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.profiles.active=open

jwt.secret=secret
